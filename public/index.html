<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.brand — SBB/CFF/FFS Identity Agent</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  @font-face { font-family:'SBBWeb'; src:url('https://cdn.app.sbb.ch/fonts/SBBWeb-Roman.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap }
  @font-face { font-family:'SBBWeb'; src:url('https://cdn.app.sbb.ch/fonts/SBBWeb-Light.woff2') format('woff2'); font-weight:300; font-style:normal; font-display:swap }
  @font-face { font-family:'SBBWeb'; src:url('https://cdn.app.sbb.ch/fonts/SBBWeb-Bold.woff2') format('woff2'); font-weight:700; font-style:normal; font-display:swap }
  @font-face { font-family:'SBBWeb'; src:url('https://cdn.app.sbb.ch/fonts/SBBWeb-UltraLight.woff2') format('woff2'); font-weight:100; font-style:normal; font-display:swap }

  :root {
    --sbb-red: #eb0000;
    --sbb-red-dark: #c60018;
    --sbb-blue: #2d327d;
    --sbb-black: #000000;
    --sbb-anthracite: #4c4c4c;
    --sbb-white: #ffffff;
    --sbb-milk: #f6f6f6;
    --sbb-cloud: #e5e5e5;
    --sbb-granite: #686868;
    --sbb-storm: #767676;
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    font-family: 'SBBWeb', 'Inter', -apple-system, sans-serif;
    background: var(--sbb-white);
    color: var(--sbb-black);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--sbb-red); color: white }
  ::-webkit-scrollbar { width: 4px }
  ::-webkit-scrollbar-track { background: transparent }
  ::-webkit-scrollbar-thumb { background: var(--sbb-cloud); border-radius: 2px }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
  @keyframes spin { to { transform:rotate(360deg) } }
  .anim { animation: fadeUp .5s cubic-bezier(.16,1,.3,1) forwards }
  .d1 { animation-delay:.06s; opacity:0 } .d2 { animation-delay:.12s; opacity:0 } .d3 { animation-delay:.18s; opacity:0 } .d4 { animation-delay:.24s; opacity:0 }

  /* SBB-style thin red line under header */
  .sbb-line { height: 1px; background: var(--sbb-cloud); position: relative }
  .sbb-line::after { content:''; position:absolute; left:0; top:0; height:1px; width:100%; background: var(--sbb-red); transform: scaleX(0); transform-origin: left; transition: transform .3s ease }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API = 'https://sbb-brand-api.billowing-leaf-4d6a.workers.dev';

/* ── SBB Logo SVG (extracted from sbb.ch) ── */
const SBBLogo = ({ height = 40, showWordmark = true }) => (
  <svg xmlns="http://www.w3.org/2000/svg" viewBox={showWordmark ? "0 0 454 48" : "0 0 142 48"} height={height} style={{display:'block'}}>
    <path id="panel" fill="#eb0000" d="M1 47h141V1H1v46z"/>
    <path id="signet" fill="#fff" d="M87 40h9.3L83.8 27.7h15.5V40h7.4V27.7h15.6L109.7 40h9.3l16-16-15.9-16h-9.3l12.5 12.3h-15.6V8h-7.4v12.3H83.8L96.3 8H87L71 24l16 16z"/>
    {showWordmark && <path id="wordmark" fill="currentColor" d="M238.2 34.6c4.1 0 6.2-1.4 6.2-4.5 0-3.2-2-4.6-6.6-4.6h-7v9h7.4zm-.4-14.4c3.5 0 5.6-1.4 5.6-3.8 0-2.7-1.9-4-5.7-4h-7v7.8h7.1zm1.1-13.4c7.3 0 11.4 3.1 11.4 8.5 0 3-1.4 5.1-4.6 6.9 4.1 1.5 5.9 4.1 5.9 8.5 0 5.9-4.6 9.6-11.9 9.6h-15.9V6.8h15.1zm-33.7 27.8c4.1 0 6.2-1.4 6.2-4.5 0-3.2-2-4.6-6.6-4.6H198v9h7.2zm-.3-14.4c3.5 0 5.6-1.4 5.6-3.8 0-2.7-1.9-4-5.7-4H198v7.8h6.9zM206 6.8c7.3 0 11.4 3.1 11.4 8.5 0 3-1.4 5.1-4.6 6.9 4.1 1.5 5.9 4.1 5.9 8.5 0 5.9-4.6 9.6-11.9 9.6H191V6.8h15zm-28 9.9c-.4-3.4-2.4-5-6.5-5-3.4 0-5.6 1.5-5.6 3.9 0 2 1.3 3.2 4.1 3.7l6 1c6.4 1.1 9.8 4.6 9.8 9.7 0 6.6-5.3 10.8-13.7 10.8-8.9 0-14.1-4.3-14.1-11.9h7.1c.4 4.4 2.6 6.2 7.3 6.2 3.6 0 6.2-1.9 6.2-4.6 0-2.1-1.4-3.4-4.1-3.9l-5.5-1c-7-1.3-10.2-4.3-10.2-9.7 0-6.2 4.9-10 12.9-10 7.8 0 12.7 4 12.9 10.6l-6.6.2zm158.7-3.9v7.8h15v5.8h-15v13.7h-7V6.8h23.5v6h-16.5zm-29.4 0v7.8h14.8v5.8h-14.8v13.7h-7V6.8h23.3v6h-16.3zm-11.8 15.7C295 36.2 289.3 41 281 41c-9.4 0-15.6-6.8-15.6-17.4 0-10.5 6.4-17.5 15.7-17.5 8.1 0 13.5 4.5 14.1 11.6h-7c-.8-3.8-3.2-5.7-7.1-5.7-5.3 0-8.8 4.6-8.8 11.6s3.4 11.6 8.6 11.6c4.3 0 6.7-2.1 7.5-6.7h7.1zm150.7-11.8c-.4-3.4-2.4-5-6.5-5-3.4 0-5.6 1.5-5.6 3.9 0 2 1.3 3.2 4.1 3.7l6 1c6.4 1.1 9.8 4.6 9.8 9.7 0 6.6-5.3 10.8-13.7 10.8-8.9 0-14-4.3-14.1-11.9h7.1c.4 4.4 2.6 6.2 7.3 6.2 3.7 0 6.2-1.9 6.2-4.6 0-2.1-1.4-3.4-4.1-3.9l-5.5-1c-7-1.3-10.2-4.3-10.2-9.7 0-6.2 4.9-10 12.9-10 7.8 0 12.7 4 13 10.6l-6.7.2zm-40.4-3.9v7.8h14.9v5.8h-14.9v13.7h-7V6.8h23.4v6h-16.4zm-29.7 0v7.8h15v5.8h-15v13.7h-7V6.8h23.5v6h-16.5z"/>}
  </svg>
);

/* ── SBB Signet only (the red square with arrow) ── */
const SBBSignet = ({ size = 32 }) => (
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 142 48" width={size * (142/48)} height={size}>
    <path fill="#eb0000" d="M1 47h141V1H1v46z"/>
    <path fill="#fff" d="M87 40h9.3L83.8 27.7h15.5V40h7.4V27.7h15.6L109.7 40h9.3l16-16-15.9-16h-9.3l12.5 12.3h-15.6V8h-7.4v12.3H83.8L96.3 8H87L71 24l16 16z"/>
  </svg>
);

function useAPI(ep) {
  const [data,setData] = useState(null);
  const [loading,setLoading] = useState(true);
  useEffect(() => { fetch(API+ep).then(r=>r.json()).then(d=>{setData(d);setLoading(false)}).catch(()=>setLoading(false)) }, [ep]);
  return {data,loading};
}

const Spin = ({text='Loading...'}) => <div style={{textAlign:'center',padding:80}}><div style={{display:'inline-block',width:20,height:20,border:'2px solid var(--sbb-cloud)',borderTopColor:'var(--sbb-red)',borderRadius:'50%',animation:'spin .6s linear infinite'}}/><p style={{color:'var(--sbb-granite)',fontSize:14,marginTop:16,fontWeight:300}}>{text}</p></div>;

/* ══════════════════════════════════════════════
   SEARCH
   ══════════════════════════════════════════════ */
function Search() {
  const [q,setQ] = useState('');
  const [results,setResults] = useState(null);
  const [loading,setLoading] = useState(false);
  const [history,setHistory] = useState([]);

  const go = useCallback(async (query) => {
    if(!query.trim()) return;
    setLoading(true);
    const r = await fetch(API+'/api/search?q='+encodeURIComponent(query));
    const d = await r.json();
    setResults(d); setLoading(false);
    setHistory(p=>[query,...p.filter(h=>h!==query)].slice(0,8));
  },[]);

  const suggestions = [
    "Can I modify the SBB logo?",
    "What is the primary brand color?",
    "Typography rules for headings",
    "How to use the Rotes Fenster?",
    "Brand values",
    "Pictogram style guidelines",
    "Logo on dark backgrounds",
    "Digital fonts"
  ];

  return (
    <div style={{maxWidth:800,margin:'0 auto'}}>
      {/* Search hero */}
      <div style={{textAlign:'center',padding:'48px 0 40px'}}>
        <SBBSignet size={48}/>
        <h2 style={{fontSize:32,fontWeight:300,marginTop:20,letterSpacing:'-0.02em',color:'var(--sbb-black)'}}>
          Ask the brand.
        </h2>
        <p style={{fontSize:16,fontWeight:300,color:'var(--sbb-granite)',marginTop:8,maxWidth:480,margin:'8px auto 0'}}>
          Semantic search across all SBB/CFF/FFS brand guidelines, rules, and specifications.
        </p>
      </div>

      {/* Search box */}
      <div style={{position:'relative',marginBottom:32}}>
        <div style={{
          display:'flex', alignItems:'center', gap:12,
          background:'var(--sbb-white)', border:'2px solid',
          borderColor: q ? 'var(--sbb-red)' : 'var(--sbb-cloud)',
          borderRadius:2, padding:'12px 16px',
          transition:'border-color .2s',
        }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={q?'var(--sbb-red)':'var(--sbb-granite)'} strokeWidth="2" strokeLinecap="round" style={{flexShrink:0,transition:'stroke .2s'}}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go(q)}
            placeholder="Ask the brand anything..."
            style={{flex:1,background:'none',border:'none',outline:'none',color:'var(--sbb-black)',fontSize:18,fontFamily:'SBBWeb, sans-serif',fontWeight:300}}
          />
          {q && <button onClick={()=>go(q)} style={{
            background:'var(--sbb-red)',color:'white',border:'none',
            borderRadius:2,padding:'8px 24px',fontSize:14,fontWeight:400,
            cursor:'pointer',fontFamily:'SBBWeb, sans-serif',transition:'background .2s',
          }} onMouseOver={e=>e.target.style.background='var(--sbb-red-dark)'} onMouseOut={e=>e.target.style.background='var(--sbb-red)'}>Search</button>}
        </div>
      </div>

      {/* Suggestions */}
      {!results && !loading && (
        <div className="anim">
          <div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center'}}>
            {suggestions.map((s,i)=>(
              <button key={i} onClick={()=>{setQ(s);go(s)}} className={`anim d${(i%4)+1}`}
                style={{background:'var(--sbb-milk)',border:'1px solid var(--sbb-cloud)',borderRadius:2,padding:'8px 16px',color:'var(--sbb-anthracite)',fontSize:14,cursor:'pointer',fontFamily:'SBBWeb, sans-serif',fontWeight:300,transition:'all .2s'}}
                onMouseOver={e=>{e.target.style.borderColor='var(--sbb-red)';e.target.style.color='var(--sbb-red)'}}
                onMouseOut={e=>{e.target.style.borderColor='var(--sbb-cloud)';e.target.style.color='var(--sbb-anthracite)'}}
              >{s}</button>
            ))}
          </div>
          {history.length>0 && (
            <div style={{marginTop:24,textAlign:'center'}}>
              <p style={{color:'var(--sbb-storm)',fontSize:12,marginBottom:8,fontWeight:400,letterSpacing:'.08em',textTransform:'uppercase'}}>Recent searches</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center'}}>
                {history.map((h,i)=><button key={i} onClick={()=>{setQ(h);go(h)}} style={{background:'none',border:'1px solid var(--sbb-cloud)',borderRadius:2,padding:'4px 10px',color:'var(--sbb-granite)',fontSize:13,cursor:'pointer',fontFamily:'SBBWeb, sans-serif',fontWeight:300}}>{h}</button>)}
              </div>
            </div>
          )}
        </div>
      )}

      {loading && <Spin text="Searching brand knowledge..."/>}

      {/* Results */}
      {results && !loading && (
        <div className="anim">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,paddingBottom:12,borderBottom:'1px solid var(--sbb-cloud)'}}>
            <span style={{color:'var(--sbb-granite)',fontSize:14,fontWeight:300}}>
              <strong style={{fontWeight:700,color:'var(--sbb-black)'}}>{results.count}</strong> result{results.count!==1?'s':''} for "<em>{results.query}</em>"
            </span>
            <button onClick={()=>{setResults(null);setQ('')}} style={{background:'none',border:'1px solid var(--sbb-cloud)',borderRadius:2,padding:'4px 14px',color:'var(--sbb-granite)',fontSize:13,cursor:'pointer',fontFamily:'SBBWeb, sans-serif'}}>Clear</button>
          </div>
          {results.results.map((r,i)=>(
            <div key={i} className={`anim d${(i%4)+1}`} style={{
              background:'var(--sbb-white)',
              borderLeft:`4px solid ${r.score>.7?'var(--sbb-red)':r.score>.5?'#f59e0b':'var(--sbb-cloud)'}`,
              padding:'20px 24px', marginBottom:16,
              boxShadow:'0 1px 3px rgba(0,0,0,0.04)',
            }}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div style={{display:'flex',gap:10,alignItems:'center'}}>
                  <span style={{
                    background:r.score>.7?'rgba(235,0,0,0.08)':r.score>.5?'rgba(245,158,11,0.08)':'var(--sbb-milk)',
                    color:r.score>.7?'var(--sbb-red)':r.score>.5?'#d97706':'var(--sbb-granite)',
                    padding:'3px 10px',borderRadius:2,fontSize:13,fontWeight:700,fontFamily:'monospace',
                  }}>{(r.score*100).toFixed(1)}%</span>
                  <span style={{color:'var(--sbb-granite)',fontSize:13,fontWeight:300,textTransform:'capitalize'}}>{r.chunk_type}</span>
                </div>
                {r.metadata?.url && <a href={r.metadata.url} target="_blank" rel="noopener" style={{color:'var(--sbb-red)',textDecoration:'none',fontSize:13,fontWeight:400}}>Source →</a>}
              </div>
              <p style={{color:'var(--sbb-black)',fontSize:15,lineHeight:1.7,fontWeight:300}}>{r.chunk_text}</p>
              {r.metadata?.section_title && (
                <div style={{marginTop:10}}>
                  <span style={{background:'var(--sbb-milk)',padding:'3px 10px',borderRadius:2,fontSize:12,color:'var(--sbb-granite)',fontWeight:400}}>{r.metadata.section_title}</span>
                </div>
              )}
            </div>
          ))}
          {results.count===0 && <div style={{textAlign:'center',padding:48,color:'var(--sbb-granite)'}}><p style={{fontWeight:300}}>No results found. Try a different query.</p></div>}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   COLORS
   ══════════════════════════════════════════════ */
function Colors() {
  const {data,loading} = useAPI('/api/colors');
  if(loading) return <Spin text="Loading color system..."/>;
  const cats = {};
  data.colors.forEach(c=>{if(!cats[c.category])cats[c.category]=[];cats[c.category].push(c)});
  return (
    <div style={{maxWidth:900,margin:'0 auto',padding:'40px 0'}}>
      <h2 style={{fontSize:28,fontWeight:300,marginBottom:8}}>Farben <span style={{color:'var(--sbb-granite)',fontSize:16}}>/ Couleurs</span></h2>
      <p style={{color:'var(--sbb-granite)',fontSize:15,fontWeight:300,marginBottom:40}}>The complete SBB color system with Pantone, RAL, and CMYK references.</p>
      {Object.entries(cats).map(([cat,colors],ci)=>(
        <div key={cat} className={`anim d${(ci%4)+1}`} style={{marginBottom:48}}>
          <h3 style={{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--sbb-granite)',marginBottom:20,paddingBottom:8,borderBottom:'1px solid var(--sbb-cloud)'}}>{cat}</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:16}}>
            {colors.map((c,i)=>(
              <div key={i} style={{overflow:'hidden',border:'1px solid var(--sbb-cloud)',borderRadius:2}}>
                <div style={{height:100,background:c.hex,borderBottom:c.hex==='#ffffff'?'1px solid var(--sbb-cloud)':'none'}}/>
                <div style={{padding:'14px 16px',background:'var(--sbb-white)'}}>
                  <p style={{fontWeight:700,fontSize:15,marginBottom:2}}>{c.name}</p>
                  <p style={{fontFamily:'monospace',fontSize:13,color:'var(--sbb-red)',marginBottom:8,fontWeight:400}}>{c.hex}</p>
                  <div style={{display:'flex',flexDirection:'column',gap:3}}>
                    {c.pantone && <span style={{fontSize:12,color:'var(--sbb-granite)',fontWeight:300}}>Pantone {c.pantone}</span>}
                    {c.ral && <span style={{fontSize:12,color:'var(--sbb-granite)',fontWeight:300}}>RAL {c.ral}</span>}
                    {c.cmyk && <span style={{fontSize:12,color:'var(--sbb-granite)',fontWeight:300}}>CMYK {c.cmyk}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════
   TYPOGRAPHY
   ══════════════════════════════════════════════ */
function Typography() {
  const {data,loading} = useAPI('/api/typography');
  if(loading) return <Spin text="Loading typography..."/>;
  return (
    <div style={{maxWidth:900,margin:'0 auto',padding:'40px 0'}}>
      <h2 style={{fontSize:28,fontWeight:300,marginBottom:8}}>Typografie <span style={{color:'var(--sbb-granite)',fontSize:16}}>/ Typographie</span></h2>
      <p style={{color:'var(--sbb-granite)',fontSize:15,fontWeight:300,marginBottom:12}}>SBB Font / SBBWeb — the custom typeface family.</p>

      {/* Live font specimen */}
      <div className="anim" style={{background:'var(--sbb-milk)',padding:32,marginBottom:40,borderRadius:2}}>
        <p style={{fontFamily:'SBBWeb, sans-serif',fontWeight:100,fontSize:36,color:'var(--sbb-red)',marginBottom:8}}>SBBWeb UltraLight.</p>
        <p style={{fontFamily:'SBBWeb, sans-serif',fontWeight:300,fontSize:36,color:'var(--sbb-black)',marginBottom:8}}>SBBWeb Light.</p>
        <p style={{fontFamily:'SBBWeb, sans-serif',fontWeight:400,fontSize:36,color:'var(--sbb-black)',marginBottom:8}}>SBBWeb Roman.</p>
        <p style={{fontFamily:'SBBWeb, sans-serif',fontWeight:700,fontSize:36,color:'var(--sbb-black)'}}>SBBWeb Bold.</p>
      </div>

      <div style={{display:'grid',gap:12}}>
        {data.typography.map((t,i)=>(
          <div key={i} className={`anim d${(i%4)+1}`} style={{
            background:'var(--sbb-white)',border:'1px solid var(--sbb-cloud)',
            borderRadius:2,padding:'18px 24px',
            display:'flex',justifyContent:'space-between',alignItems:'center',gap:16,
          }}>
            <div style={{flex:1}}>
              <div style={{display:'flex',gap:8,alignItems:'baseline',marginBottom:4}}>
                <span style={{fontWeight:700,fontSize:16}}>{t.font_name||t.name||'Font'}</span>
                {t.weight && <span style={{background:'var(--sbb-milk)',padding:'2px 8px',borderRadius:2,fontSize:12,color:'var(--sbb-granite)',fontWeight:400}}>{t.weight}</span>}
              </div>
              {(t.usage_context||t.usage) && <p style={{color:'var(--sbb-anthracite)',fontSize:14,lineHeight:1.5,fontWeight:300}}>{t.usage_context||t.usage}</p>}
            </div>
            <div style={{textAlign:'right'}}>
              {t.size_range && <span style={{fontFamily:'monospace',fontSize:12,color:'var(--sbb-granite)',display:'block'}}>{t.size_range}</span>}
              {t.restrictions && <span style={{fontSize:12,color:'var(--sbb-red)',fontWeight:400,display:'block',marginTop:4}}>{t.restrictions}</span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   RULES
   ══════════════════════════════════════════════ */
function Rules() {
  const {data,loading} = useAPI('/api/rules');
  const [filter,setFilter] = useState('all');
  if(loading) return <Spin text="Loading brand rules..."/>;
  const types = ['all',...new Set(data.rules.map(r=>r.type))];
  const filtered = filter==='all'?data.rules:data.rules.filter(r=>r.type===filter);
  const tc = {principle:'var(--sbb-blue)',usage:'#0a7d3f',restriction:'var(--sbb-red)',exception:'#d97706',technical:'var(--sbb-anthracite)'};
  return (
    <div style={{maxWidth:900,margin:'0 auto',padding:'40px 0'}}>
      <h2 style={{fontSize:28,fontWeight:300,marginBottom:8}}>Markenregeln <span style={{color:'var(--sbb-granite)',fontSize:16}}>/ Brand Rules</span></h2>
      <p style={{color:'var(--sbb-granite)',fontSize:15,fontWeight:300,marginBottom:24}}>All binding guidelines for SBB brand usage.</p>
      <div style={{display:'flex',gap:6,marginBottom:28,flexWrap:'wrap'}}>
        {types.map(t=>(
          <button key={t} onClick={()=>setFilter(t)} style={{
            background:filter===t?(tc[t]||'var(--sbb-red)'):'var(--sbb-white)',
            color:filter===t?'white':'var(--sbb-anthracite)',
            border:'1px solid', borderColor:filter===t?'transparent':'var(--sbb-cloud)',
            borderRadius:2,padding:'6px 16px',fontSize:13,fontWeight:filter===t?700:400,
            cursor:'pointer',fontFamily:'SBBWeb, sans-serif',textTransform:'capitalize',transition:'all .15s',
          }}>{t==='all'?`All (${data.rules.length})`:`${t} (${data.rules.filter(r=>r.type===t).length})`}</button>
        ))}
      </div>
      <div style={{display:'grid',gap:8}}>
        {filtered.map((r,i)=>(

/* ══════════════════════════════════════════════

function Workspace() {
  const [notes,setNotes] = useState([
    {id:1,author:'Daniel',text:'The .brand concept goes beyond static guidelines. Every brand should have an agent that understands its DNA.',color:'var(--sbb-red)',ts:'09.04.2025'},
    {id:2,author:'Nicolas',text:'Les 6 typologies forment la base théorique. Le .brand est la 7ème — l\'identité consciente, autonome, qui peut dialoguer.',color:'var(--sbb-blue)',ts:'09.04.2025'},
    {id:3,author:'Daniel',text:'SBB is the perfect first case: strict rules, multilingual (DE/FR/IT/EN), complex system (logo + Bildmarke + Signet + Rotes Fenster).',color:'var(--sbb-red)',ts:'09.04.2025'},
    {id:4,author:'Nicolas',text:'Important: le framework Influenceurs/Récepteurs. Le .brand agent est un Influenceur qui maintient la cohérence face aux Récepteurs (designers, agences).',color:'var(--sbb-blue)',ts:'09.04.2025'},
    {id:5,author:'Daniel',text:'Phase 1 live: API at sbb-brand-api.billowing-leaf-4d6a.workers.dev — 17 semantic chunks, full brand system in D1, GitHub Actions CI/CD.',color:'var(--sbb-red)',ts:'09.04.2025'},
  ]);
  const [newNote,setNewNote] = useState('');
  const [author,setAuthor] = useState('Daniel');

  const add = () => {
    if(!newNote.trim()) return;
    setNotes(p=>[...p,{id:Date.now(),author,text:newNote,color:author==='Daniel'?'var(--sbb-red)':'var(--sbb-blue)',ts:new Date().toLocaleDateString('de-CH')}]);
    setNewNote('');
  };

  return (
    <div style={{maxWidth:800,margin:'0 auto',padding:'40px 0'}}>
      <h2 style={{fontSize:28,fontWeight:300,marginBottom:8}}>Workspace</h2>
      <p style={{color:'var(--sbb-granite)',fontSize:15,fontWeight:300,marginBottom:32}}>Shared thinking space — Daniel & Nicolas.</p>

      <div className="anim" style={{background:'var(--sbb-milk)',border:'1px solid var(--sbb-cloud)',borderRadius:2,padding:24,marginBottom:32}}>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          {['Daniel','Nicolas'].map(n=>(
            <button key={n} onClick={()=>setAuthor(n)} style={{
              background:author===n?(n==='Daniel'?'var(--sbb-red)':'var(--sbb-blue)'):'var(--sbb-white)',
              color:author===n?'white':'var(--sbb-anthracite)',
              border:'1px solid',borderColor:author===n?'transparent':'var(--sbb-cloud)',
              borderRadius:2,padding:'6px 20px',fontSize:14,fontWeight:author===n?700:400,
              cursor:'pointer',fontFamily:'SBBWeb, sans-serif',transition:'all .15s',
            }}>{n}</button>
          ))}
        </div>
        <div style={{display:'flex',gap:10}}>
          <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();add()}}}
            placeholder="Add a thought, idea, or question..."
            rows={2} style={{flex:1,background:'var(--sbb-white)',border:'1px solid var(--sbb-cloud)',borderRadius:2,padding:'10px 14px',color:'var(--sbb-black)',fontSize:15,fontFamily:'SBBWeb, sans-serif',fontWeight:300,resize:'vertical',outline:'none'}}
          />
          <button onClick={add} style={{background:'var(--sbb-red)',color:'white',border:'none',borderRadius:2,padding:'0 24px',fontSize:14,fontWeight:400,cursor:'pointer',fontFamily:'SBBWeb, sans-serif',alignSelf:'flex-end'}}
            onMouseOver={e=>e.target.style.background='var(--sbb-red-dark)'} onMouseOut={e=>e.target.style.background='var(--sbb-red)'}
          >Add</button>
        </div>
      </div>

      <div style={{display:'grid',gap:12}}>
        {[...notes].reverse().map((n,i)=>(
          <div key={n.id} className={`anim d${(i%4)+1}`} style={{
            background:'var(--sbb-white)',border:'1px solid var(--sbb-cloud)',
            borderRadius:2,padding:'16px 20px',
            borderLeft:`4px solid ${n.color}`,
          }}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontWeight:700,fontSize:14,color:n.color}}>{n.author}</span>
              <span style={{fontSize:12,color:'var(--sbb-granite)',fontWeight:300}}>{n.ts}</span>
            </div>
            <p style={{color:'var(--sbb-anthracite)',fontSize:15,lineHeight:1.6,fontWeight:300}}>{n.text}</p>
          </div>
        ))}
      </div>
    </div>
  );
}
