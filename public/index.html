<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.brand Studio — SBB/CFF/FFS</title>
<style>
  @font-face{font-family:'SBBWeb';src:url('https://cdn.app.sbb.ch/fonts/SBBWeb-Light.woff2') format('woff2');font-weight:300}
  @font-face{font-family:'SBBWeb';src:url('https://cdn.app.sbb.ch/fonts/SBBWeb-Roman.woff2') format('woff2');font-weight:400}
  @font-face{font-family:'SBBWeb';src:url('https://cdn.app.sbb.ch/fonts/SBBWeb-Bold.woff2') format('woff2');font-weight:700}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'SBBWeb',system-ui,sans-serif;background:#0a0a0a;color:#fff;overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}
  ::selection{background:#eb0000;color:#fff}
  canvas{display:block;position:absolute;top:0;left:0}

  #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}

  #header{position:absolute;top:0;left:0;right:0;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;pointer-events:auto}
  #header .brand{display:flex;align-items:center;gap:12px}
  #header .brand h1{font-size:16px;font-weight:700;letter-spacing:-.01em}
  #header .brand h1 span{color:#eb0000}
  #header .brand small{font-size:12px;color:#555;font-weight:300}
  #header .links{display:flex;gap:14px;align-items:center}
  #header .links a{color:#555;text-decoration:none;font-size:12px;font-weight:300}
  #header .links .dot{width:6px;height:6px;border-radius:50%;background:#10b981}

  #prompt-bar{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);width:600px;max-width:calc(100% - 48px);pointer-events:auto}
  #prompt-bar .input-wrap{display:flex;background:rgba(20,20,20,.9);border:1px solid #333;border-radius:8px;backdrop-filter:blur(20px);overflow:hidden;transition:border-color .2s}
  #prompt-bar .input-wrap:focus-within{border-color:#eb0000}
  #prompt-bar input{flex:1;background:none;border:none;padding:14px 18px;color:#fff;font-size:15px;font-family:inherit;font-weight:300;outline:none}
  #prompt-bar input::placeholder{color:#555}
  #prompt-bar .cats{display:flex;gap:4px;padding:8px 10px;align-items:center}
  #prompt-bar .cat-btn{width:28px;height:28px;border-radius:4px;border:1px solid #333;background:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
  #prompt-bar .cat-btn:hover,.prompt-bar .cat-btn.active{border-color:currentColor;background:rgba(255,255,255,.05)}
  #prompt-bar .hint{text-align:center;color:#333;font-size:11px;margin-top:8px;font-weight:300}

  #detail{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,10,.95);border:1px solid #333;border-radius:12px;padding:0;max-width:500px;width:90%;backdrop-filter:blur(30px);pointer-events:auto;display:none;overflow:hidden;z-index:100}
  #detail.show{display:block;animation:popIn .3s cubic-bezier(.16,1,.3,1)}
  #detail .detail-color{height:4px}
  #detail .detail-body{padding:24px}
  #detail .detail-title{font-size:20px;font-weight:700;margin-bottom:4px}
  #detail .detail-cat{font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:400}
  #detail .detail-text{font-size:14px;color:#aaa;line-height:1.7;font-weight:300}
  #detail .detail-img{width:100%;max-height:300px;object-fit:cover;margin-bottom:16px;border-radius:6px}
  #detail .detail-sound{margin:12px 0}
  #detail .detail-sound button{background:#eb0000;color:#fff;border:none;border-radius:4px;padding:8px 20px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700}
  #detail .detail-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:4px;border:1px solid #333;background:none;color:#666;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #detail .detail-close:hover{border-color:#666;color:#fff}

  #side-list{position:absolute;right:0;top:52px;bottom:80px;width:220px;overflow-y:auto;pointer-events:auto;padding:8px}
  #side-list::-webkit-scrollbar{width:3px}
  #side-list::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
  #side-list .item{padding:8px 10px;border-radius:4px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px}
  #side-list .item:hover{background:rgba(255,255,255,.03)}
  #side-list .item .item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  #side-list .item .item-title{font-size:12px;color:#888;font-weight:300;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  #counter{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;color:#333;font-size:12px;pointer-events:none;font-weight:300}

  @keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="header">
    <div class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 142 48" width="60" height="20"><path fill="#eb0000" d="M1 47h141V1H1v46z"/><path fill="#fff" d="M87 40h9.3L83.8 27.7h15.5V40h7.4V27.7h15.6L109.7 40h9.3l16-16-15.9-16h-9.3l12.5 12.3h-15.6V8h-7.4v12.3H83.8L96.3 8H87L71 24l16 16z"/></svg>
      <div><h1><span>.</span>brand Studio</h1><small>SBB/CFF/FFS — living brand identity</small></div>
    </div>
    <div class="links">
      <div class="dot"></div>
      <a href="https://sbb-brand-api.billowing-leaf-4d6a.workers.dev/api" target="_blank">API →</a>
      <a href="https://github.com/nordspot/sbb-brand-api" target="_blank">GitHub →</a>
    </div>
  </div>

  <div id="prompt-bar">
    <div class="input-wrap">
      <input id="input" type="text" placeholder="Add a mood, texture, sound, feeling, image URL..." autocomplete="off"/>
      <div class="cats">
        <button class="cat-btn" data-cat="visual" style="color:#eb0000" title="Visual">◆</button>
        <button class="cat-btn" data-cat="texture" style="color:#f59e0b" title="Texture">▦</button>
        <button class="cat-btn" data-cat="sound" style="color:#8b5cf6" title="Sound">♪</button>
        <button class="cat-btn" data-cat="culture" style="color:#3b82f6" title="Culture">⬡</button>
        <button class="cat-btn" data-cat="story" style="color:#10b981" title="Story">¶</button>
        <button class="cat-btn" data-cat="feeling" style="color:#ec4899" title="Feeling">◎</button>
        <button class="cat-btn" data-cat="rule" style="color:#6b7280" title="Rule">§</button>
        <button class="cat-btn" data-cat="mcp" style="color:#06b6d4" title="MCP">⚙</button>
      </div>
    </div>
    <div class="hint">Type to add elements · Paste or drop images · Click dots to explore</div>
  </div>

  <div id="side-list"></div>
  <div id="counter"></div>

  <div id="detail">
    <div class="detail-color"></div>
    <button class="detail-close" onclick="closeDetail()">×</button>
    <div class="detail-body">
      <div class="detail-cat" id="det-cat"></div>
      <div class="detail-title" id="det-title"></div>
      <div id="det-img-wrap"></div>
      <div id="det-sound-wrap"></div>
      <div class="detail-text" id="det-text"></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CORE ENGINE
   ═══════════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

const CATS = {
  visual:  {label:'Visual',  color:'#eb0000', icon:'◆'},
  texture: {label:'Texture', color:'#f59e0b', icon:'▦'},
  sound:   {label:'Sound',   color:'#8b5cf6', icon:'♪'},
  culture: {label:'Culture', color:'#3b82f6', icon:'⬡'},
  story:   {label:'Story',   color:'#10b981', icon:'¶'},
  feeling: {label:'Feeling', color:'#ec4899', icon:'◎'},
  rule:    {label:'Rule',    color:'#6b7280', icon:'§'},
  mcp:     {label:'MCP',     color:'#06b6d4', icon:'⚙'},
};

let activeCat = 'feeling';
let particles = [];
let shapePoints = []; // points sampled from the SBB signet
let mouseX = 0, mouseY = 0;
let hoveredParticle = null;
let audioCtx = null;
let time = 0;

/* ── Resize ── */
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  generateShapePoints();
}
window.addEventListener('resize', resize);

/* ═══════════════════════════════════════════════
   GENERATE SBB SIGNET SHAPE POINTS
   Sample positions from the signet SVG
   ═══════════════════════════════════════════════ */
function generateShapePoints() {
  shapePoints = [];
  // Render signet to offscreen canvas, sample pixel positions
  const offscreen = document.createElement('canvas');
  const scale = Math.min(W * 0.55, H * 0.65) / 48; // scale to fill good portion of screen
  const sw = Math.round(142 * scale);
  const sh = Math.round(48 * scale);
  offscreen.width = sw;
  offscreen.height = sh;
  const octx = offscreen.getContext('2d');

  // Draw the signet: red background + white arrow
  // First fill red
  octx.fillStyle = '#eb0000';
  octx.fillRect(0, 0, sw, sh);

  // Draw white arrow (scaled path)
  octx.save();
  octx.scale(scale, scale);
  const arrowPath = new Path2D('M87 40h9.3L83.8 27.7h15.5V40h7.4V27.7h15.6L109.7 40h9.3l16-16-15.9-16h-9.3l12.5 12.3h-15.6V8h-7.4v12.3H83.8L96.3 8H87L71 24l16 16z');
  octx.fillStyle = '#ffffff';
  octx.fill(arrowPath);
  octx.restore();

  // Sample pixels
  const imageData = octx.getImageData(0, 0, sw, sh);
  const data = imageData.data;
  const offsetX = (W - sw) / 2;
  const offsetY = (H - sh) / 2 - 20;
  const spacing = Math.max(8, Math.round(14 - scale * 0.5));

  for (let y = 0; y < sh; y += spacing) {
    for (let x = 0; x < sw; x += spacing) {
      const idx = (y * sw + x) * 4;
      const r = data[idx], g = data[idx+1], b = data[idx+2];
      // Is it red area or white arrow?
      const isWhite = r > 200 && g > 200 && b > 200;
      const isRed = r > 200 && g < 50 && b < 50;
      if (isWhite || isRed) {
        shapePoints.push({
          x: x + offsetX,
          y: y + offsetY,
          isArrow: isWhite,
          taken: false,
        });
      }
    }
  }

  // Shuffle for organic feel
  for (let i = shapePoints.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shapePoints[i], shapePoints[j]] = [shapePoints[j], shapePoints[i]];
  }
}

/* ═══════════════════════════════════════════════
   PARTICLE CLASS
   ═══════════════════════════════════════════════ */
function createParticle(opts) {
  const available = shapePoints.filter(p => !p.taken);
  if (available.length === 0) return null;

  // Prefer arrow points for certain categories, red for others
  let target;
  const arrowCats = ['feeling','culture','story','sound'];
  const prefer = arrowCats.includes(opts.cat) ? available.filter(p=>p.isArrow) : available.filter(p=>!p.isArrow);
  target = prefer.length > 0 ? prefer[Math.floor(Math.random()*prefer.length)] : available[Math.floor(Math.random()*available.length)];

  target.taken = true;

  const p = {
    id: 'p' + Date.now() + Math.random(),
    // Start from bottom center (prompt bar area)
    x: W/2 + (Math.random()-0.5)*100,
    y: H - 60,
    // Target position
    tx: target.x + (Math.random()-0.5)*4,
    ty: target.y + (Math.random()-0.5)*4,
    isArrow: target.isArrow,
    // Visual
    radius: 3 + Math.random()*2,
    cat: opts.cat || 'visual',
    color: CATS[opts.cat]?.color || '#eb0000',
    baseColor: target.isArrow ? '#ffffff' : '#eb0000',
    // Content
    title: opts.title || '',
    body: opts.body || '',
    image: opts.image || null,
    imageLoaded: null,
    soundFreq: opts.soundFreq || null,
    // State
    progress: 0, // 0 = at start, 1 = at target
    pulse: Math.random() * Math.PI * 2,
    connections: [],
    alive: true,
    birth: Date.now(),
  };

  // Load image if URL
  if (p.image) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { p.imageLoaded = img; };
    img.src = p.image;
  }

  particles.push(p);
  updateSideList();
  updateCounter();
  return p;
}

/* ═══════════════════════════════════════════════
   AUTO-CONNECT nearby particles
   ═══════════════════════════════════════════════ */
function autoConnect(p) {
  const maxDist = 80;
  const maxConn = 3;
  let count = 0;
  for (const other of particles) {
    if (other === p || count >= maxConn) break;
    const dx = p.tx - other.tx;
    const dy = p.ty - other.ty;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < maxDist && !p.connections.includes(other.id)) {
      p.connections.push(other.id);
      other.connections.push(p.id);
      count++;
    }
  }
}

/* ═══════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════ */
function render() {
  time += 0.016;
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Draw faint structural dots for empty shape positions
  for (const sp of shapePoints) {
    if (!sp.taken) {
      const pulse = Math.sin(time * 0.5 + sp.x * 0.01 + sp.y * 0.01) * 0.3 + 0.7;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, 1.5, 0, Math.PI*2);
      ctx.fillStyle = sp.isArrow
        ? `rgba(255,255,255,${0.04 * pulse})`
        : `rgba(235,0,0,${0.06 * pulse})`;
      ctx.fill();
    }
  }

  // Draw connections
  for (const p of particles) {
    if (p.progress < 0.5) continue;
    const alpha = Math.min(1, (p.progress - 0.5) * 2) * 0.15;
    for (const cid of p.connections) {
      const other = particles.find(q => q.id === cid);
      if (!other || other.progress < 0.5) continue;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(other.x, other.y);
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  // Draw and update particles
  hoveredParticle = null;
  const mx = mouseX, my = mouseY;

  for (const p of particles) {
    // Animate toward target
    if (p.progress < 1) {
      p.progress = Math.min(1, p.progress + 0.015);
      const ease = 1 - Math.pow(1 - p.progress, 3); // cubic ease out
      p.x = p.x + (p.tx - p.x) * 0.04;
      p.y = p.y + (p.ty - p.y) * 0.04;
    } else {
      // Gentle breathing
      const breathe = Math.sin(time * 1.2 + p.pulse) * 0.8;
      p.x = p.tx + breathe;
      p.y = p.ty + Math.cos(time * 0.9 + p.pulse) * 0.6;
    }

    // Check hover
    const dx = mx - p.x, dy = my - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const isHovered = dist < 18;
    if (isHovered) hoveredParticle = p;

    // Draw glow for hovered
    if (isHovered) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 20, 0, Math.PI*2);
      const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 20);
      glow.addColorStop(0, p.color + '44');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Draw particle
    const r = isHovered ? p.radius * 2 : p.radius + Math.sin(time * 2 + p.pulse) * 0.5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);

    // Color: blend between base shape color and category color based on content
    if (p.title) {
      ctx.fillStyle = isHovered ? '#ffffff' : p.color;
    } else {
      ctx.fillStyle = p.baseColor === '#ffffff'
        ? `rgba(255,255,255,${0.3 + Math.sin(time + p.pulse)*0.1})`
        : `rgba(235,0,0,${0.4 + Math.sin(time + p.pulse)*0.1})`;
    }
    ctx.fill();

    // Show image thumbnail on hover
    if (isHovered && p.imageLoaded) {
      const iw = 120, ih = 80;
      const ix = p.x - iw/2, iy = p.y - ih - 16;
      ctx.save();
      ctx.globalAlpha = 0.95;
      ctx.beginPath();
      ctx.roundRect(ix-2, iy-2, iw+4, ih+4, 6);
      ctx.fillStyle = '#000';
      ctx.fill();
      ctx.drawImage(p.imageLoaded, ix, iy, iw, ih);
      ctx.restore();
    }

    // Show title on hover
    if (isHovered && p.title && !p.imageLoaded) {
      ctx.save();
      ctx.font = '12px SBBWeb, system-ui';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(p.title, p.x, p.y - 16);
      ctx.restore();
    }
  }

  // Cursor
  canvas.style.cursor = hoveredParticle ? 'pointer' : 'default';

  requestAnimationFrame(render);
}

/* ═══════════════════════════════════════════════
   SOUND ENGINE
   ═══════════════════════════════════════════════ */
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration = 0.5, type = 'sine') {
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playSBBChime() {
  initAudio();
  // Approximate the SBB 3-tone station chime: G5-C6-E6
  const notes = [784, 1047, 1319];
  notes.forEach((f,i) => {
    setTimeout(() => playTone(f, 0.8, 'sine'), i * 350);
  });
}

function playChord(baseFreq) {
  initAudio();
  [baseFreq, baseFreq * 1.25, baseFreq * 1.5].forEach(f => playTone(f, 1.2, 'triangle'));
}

/* ═══════════════════════════════════════════════
   DETAIL PANEL
   ═══════════════════════════════════════════════ */
function showDetail(p) {
  const det = document.getElementById('detail');
  const cat = CATS[p.cat];
  det.querySelector('.detail-color').style.background = cat.color;
  document.getElementById('det-cat').textContent = cat.icon + ' ' + cat.label;
  document.getElementById('det-cat').style.color = cat.color;
  document.getElementById('det-title').textContent = p.title;
  document.getElementById('det-text').textContent = p.body;

  const imgWrap = document.getElementById('det-img-wrap');
  imgWrap.innerHTML = '';
  if (p.imageLoaded) {
    const img = document.createElement('img');
    img.src = p.image;
    img.className = 'detail-img';
    imgWrap.appendChild(img);
  }

  const soundWrap = document.getElementById('det-sound-wrap');
  soundWrap.innerHTML = '';
  if (p.soundFreq || p.cat === 'sound') {
    const btn = document.createElement('button');
    btn.textContent = '▶ Play Sound';
    btn.onclick = () => {
      if (p.soundFreq) playChord(p.soundFreq);
      else playSBBChime();
    };
    const div = document.createElement('div');
    div.className = 'detail-sound';
    div.appendChild(btn);
    soundWrap.appendChild(div);
  }

  det.className = 'show';
}

function closeDetail() {
  document.getElementById('detail').className = '';
}

/* ═══════════════════════════════════════════════
   SIDE LIST
   ═══════════════════════════════════════════════ */
function updateSideList() {
  const list = document.getElementById('side-list');
  const contentParticles = particles.filter(p => p.title);
  list.innerHTML = contentParticles.map(p => {
    const cat = CATS[p.cat];
    return `<div class="item" onclick="focusParticle('${p.id}')">
      <div class="item-dot" style="background:${cat.color}"></div>
      <div class="item-title">${cat.icon} ${p.title}</div>
    </div>`;
  }).join('');
}

function focusParticle(id) {
  const p = particles.find(q => q.id === id);
  if (p) showDetail(p);
}

function updateCounter() {
  const content = particles.filter(p => p.title).length;
  const total = particles.length;
  document.getElementById('counter').textContent =
    `${content} elements · ${particles.reduce((s,p)=>s+p.connections.length,0)/2|0} connections · ${shapePoints.filter(p=>!p.taken).length} positions available`;
}

/* ═══════════════════════════════════════════════
   INPUT HANDLING
   ═══════════════════════════════════════════════ */
const input = document.getElementById('input');

// Category buttons
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeCat = btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.style.background = 'none');
    btn.style.background = 'rgba(255,255,255,.08)';
    input.focus();
  });
});

// Submit
input.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' || !input.value.trim()) return;
  const val = input.value.trim();

  // Check if it's an image URL
  const isImage = /\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(val) || val.startsWith('data:image');

  const p = createParticle({
    cat: activeCat,
    title: isImage ? 'Image' : val,
    body: isImage ? val : '',
    image: isImage ? val : null,
    soundFreq: activeCat === 'sound' ? 200 + Math.random() * 600 : null,
  });

  if (p) {
    setTimeout(() => autoConnect(p), 500);
    // Play a subtle tone on add
    initAudio();
    playTone(400 + particles.length * 20, 0.3, 'sine');
  }

  input.value = '';
});

// Paste images
window.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (ev) => {
        const p = createParticle({
          cat: 'visual',
          title: 'Pasted Image',
          body: '',
          image: ev.target.result,
        });
        if (p) setTimeout(() => autoConnect(p), 500);
      };
      reader.readAsDataURL(file);
      return;
    }
  }
});

// Drop images
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', (e) => {
  e.preventDefault();
  for (const file of (e.dataTransfer?.files || [])) {
    if (file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const p = createParticle({
          cat: 'visual',
          title: file.name.replace(/\.[^.]+$/,''),
          body: '',
          image: ev.target.result,
        });
        if (p) setTimeout(() => autoConnect(p), 500);
      };
      reader.readAsDataURL(file);
    }
  }
});

// Mouse tracking
window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

// Click to show detail
canvas.addEventListener('click', () => {
  if (hoveredParticle && hoveredParticle.title) {
    showDetail(hoveredParticle);
    // Play sound for sound items
    if (hoveredParticle.cat === 'sound') {
      if (hoveredParticle.soundFreq) playChord(hoveredParticle.soundFreq);
      else playSBBChime();
    }
  }
});

// Escape to close
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});
